document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Roboto Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"9e2c209a-edec-446d-b024-32df60b34d8a\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Roboto Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"3fd580ac-6e96-44e3-99c9-568057db9826\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Roboto Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"e7d5ede5-a92f-466a-9d80-34822bf5b585\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ── Brand colors — Primary palette (page 49) ─────────────────── */\n  /* 3 strong impactful colors + white. Used consistently across all       */\n  /* applications. White used generously to keep brand fresh.              */\n\n  --wwt-bright-red:    #EE282A;  /* WWT Bright Red */\n  --wwt-bright-red-75: #F15355;\n  --wwt-bright-red-50: #F57E7F;\n  --wwt-bright-red-25: #F8A9AA;\n\n  --wwt-light-blue:    #0086EA;  /* WWT Light Blue — also a TYPE color */\n  --wwt-light-blue-75: #339EEE;\n  --wwt-light-blue-50: #66B6F2;\n  --wwt-light-blue-25: #99CFF7;\n\n  --wwt-dark-blue:     #1C0087;  /* WWT Dark Blue */\n  --wwt-dark-blue-75:  #49339F;\n  --wwt-dark-blue-50:  #7766B7;\n  --wwt-dark-blue-25:  #A499CF;\n\n  /* Role-based aliases — Light Blue=primary, Dark Blue=secondary, Bright Red=accent. */\n  --wwt-primary:       var(--wwt-light-blue);\n  --wwt-primary-hover: #006BBE;\n  --wwt-secondary:     var(--wwt-dark-blue);\n  --wwt-secondary-hover:#14005F;\n  --wwt-accent:        var(--wwt-bright-red);\n  --wwt-accent-hover:  #C81C1E;\n\n  /* Shorthand aliases — pick whichever reads best in context. */\n  --wwt-red:           var(--wwt-bright-red);\n  --wwt-red-deep:      #C81C1E;\n  --wwt-red-tint:      var(--wwt-bright-red-25);\n\n  --wwt-blue:          var(--wwt-light-blue);\n  --wwt-blue-deep:     #006BBE;\n  --wwt-blue-bright:   var(--wwt-light-blue-75);\n  --wwt-blue-tint:     #E5F2FC;\n\n  --wwt-indigo:        var(--wwt-dark-blue);\n  --wwt-indigo-deep:   #14005F;\n  --wwt-indigo-tint:   var(--wwt-dark-blue-25);\n\n  --wwt-black:         #0B0B0C;  /* \"true black\" — reserved for type & marks */\n  --wwt-ink:           #1A1A1A;  /* default foreground on light */\n  --wwt-white:         #FFFFFF;\n\n  /* ── Neutral scale (cool gray) ────────────────────────────────── */\n  --gray-25:  #FAFAFB;\n  --gray-50:  #F4F5F7;\n  --gray-100: #E9EBEE;\n  --gray-200: #D6DAE0;\n  --gray-300: #B6BCC4;\n  --gray-400: #8A919B;\n  --gray-500: #5F6770;\n  --gray-600: #424952;\n  --gray-700: #2A2F36;\n  --gray-800: #181C21;\n  --gray-900: #0E1115;\n\n  /* ── Secondary palette (page 50) ──────────────────────────────── */\n  /* Supportive — charts, diagrams, lower-level UI. NEVER on logo or       */\n  /* top-level brand elements. Black tints reserved for text & background. */\n  --sec-royal-blue:    #162FB4;\n  --sec-royal-blue-75: #5365C8;\n  --sec-royal-blue-50: #8B97DA;\n  --sec-royal-blue-25: #C5CBEC;\n\n  --sec-violet:        #330072;\n  --sec-violet-75:     #664095;\n  --sec-violet-50:     #9980B9;\n  --sec-violet-25:     #CCBFDC;\n\n  --sec-navy:          #1D1E48;\n  --sec-navy-75:       #565676;\n  --sec-navy-50:       #8E8FA4;\n  --sec-navy-25:       #C7C7D1;\n\n  --sec-orange:        #FB550E;\n  --sec-orange-75:     #F97C4C;\n  --sec-orange-50:     #F7A17B;\n  --sec-orange-25:     #F3C4A8;\n\n  --sec-pink:          #E31C79;\n  --sec-pink-75:       #EA559B;\n  --sec-pink-50:       #F18EBC;\n  --sec-pink-25:       #F8C6DE;\n\n  --sec-purple:        #8212C4;\n  --sec-purple-75:     #A14DD3;\n  --sec-purple-50:     #C189E2;\n  --sec-purple-25:     #E0C4F0;\n\n  --sec-black:         #000000;\n  --sec-black-75:      #404040;\n  --sec-black-50:      #808080;\n  --sec-black-25:      #BFBFBF;\n  --sec-black-5:       #F2F2F2;\n\n  /* ── Status / semantic accents ────────────────────────────────── */\n  /* Used only for status feedback (not part of secondary palette).      */\n  --accent-amber:  #F2A900;\n  --accent-green:  #2E8B45;\n\n  /* ── Semantic colors ──────────────────────────────────────────── */\n  --color-bg:           var(--wwt-white);\n  --color-bg-subtle:    var(--gray-50);\n  --color-bg-muted:     var(--gray-100);\n  --color-bg-inverse:   var(--wwt-black);\n\n  --color-fg:           var(--wwt-ink);\n  --color-fg-muted:     var(--gray-500);\n  --color-fg-subtle:    var(--gray-400);\n  --color-fg-inverse:   var(--wwt-white);\n  --color-fg-on-red:    var(--wwt-white);\n\n  --color-border:       var(--gray-200);\n  --color-border-strong:var(--gray-300);\n  --color-divider:      var(--gray-100);\n\n  --color-link:         var(--wwt-blue);\n  --color-link-hover:   var(--wwt-blue-deep);\n  --color-focus-ring:   var(--wwt-blue);\n\n  --color-success: var(--accent-green);\n  --color-warning: var(--accent-amber);\n  --color-error:   var(--wwt-red);\n  --color-info:    var(--wwt-blue);\n\n  /* ── Type ─────────────────────────────────────────────────────── */\n  --font-sans:    \"Roobert\", \"Helvetica Neue\", Arial, system-ui, sans-serif;\n  --font-display: \"Roobert\", \"Helvetica Neue\", Arial, system-ui, sans-serif;\n  --font-serif:   Georgia, \"Times New Roman\", serif;\n  --font-mono:    \"Roboto Mono\", \"SF Mono\", Menlo, Consolas, monospace;\n\n  /* Weights — Roobert ships Light/Regular/Bold/Heavy. Medium (500) is */\n  /* not in the family and will fall back to Regular.                  */\n  --fw-light:     300;\n  --fw-regular:   400;\n  --fw-medium:    400;  /* alias — Roobert has no medium */\n  --fw-bold:      700;\n  --fw-black:     900;\n\n  /* Type scale — 1.20 (minor third), tuned for editorial + UI mix. */\n  --fs-xs:    12px;\n  --fs-sm:    14px;\n  --fs-base:  16px;\n  --fs-md:    18px;\n  --fs-lg:    20px;\n  --fs-xl:    24px;\n  --fs-2xl:   30px;\n  --fs-3xl:   38px;\n  --fs-4xl:   48px;\n  --fs-5xl:   60px;\n  --fs-6xl:   76px;\n  --fs-7xl:   96px;\n\n  --lh-tight:   1.1;\n  --lh-snug:    1.25;\n  --lh-normal:  1.5;\n  --lh-relaxed: 1.65;\n\n  --tracking-tight:  -0.02em;\n  --tracking-snug:   -0.01em;\n  --tracking-normal:  0em;\n  --tracking-wide:    0.04em;\n  --tracking-caps:    0.08em;\n\n  /* ── Spacing scale (4-step) ───────────────────────────────────── */\n  --space-0:    0;\n  --space-1:    4px;\n  --space-2:    8px;\n  --space-3:    12px;\n  --space-4:    16px;\n  --space-5:    20px;\n  --space-6:    24px;\n  --space-8:    32px;\n  --space-10:   40px;\n  --space-12:   48px;\n  --space-16:   64px;\n  --space-20:   80px;\n  --space-24:   96px;\n  --space-32:   128px;\n\n  /* ── Radii ────────────────────────────────────────────────────── */\n  /* WWT trends modest — small radii on cards, full pills on chips. */\n  --radius-none: 0;\n  --radius-xs:   2px;\n  --radius-sm:   4px;\n  --radius-md:   6px;\n  --radius-lg:   10px;\n  --radius-xl:   16px;\n  --radius-2xl:  24px;\n  --radius-pill: 999px;\n\n  /* ── Elevation ────────────────────────────────────────────────── */\n  --shadow-xs: 0 1px 2px rgba(11,11,12,0.06);\n  --shadow-sm: 0 1px 3px rgba(11,11,12,0.08), 0 1px 2px rgba(11,11,12,0.04);\n  --shadow-md: 0 4px 10px rgba(11,11,12,0.08), 0 2px 4px rgba(11,11,12,0.04);\n  --shadow-lg: 0 12px 28px rgba(11,11,12,0.10), 0 4px 10px rgba(11,11,12,0.05);\n  --shadow-xl: 0 28px 60px rgba(11,11,12,0.14), 0 10px 20px rgba(11,11,12,0.06);\n  --shadow-focus: 0 0 0 3px rgba(0,134,234,0.35);\n\n  /* ── Motion ───────────────────────────────────────────────────── */\n  --ease-out:   cubic-bezier(0.16, 1, 0.3, 1);\n  --ease-in:    cubic-bezier(0.5, 0, 0.95, 0.45);\n  --ease-inout: cubic-bezier(0.65, 0, 0.35, 1);\n\n  --dur-fast:    140ms;\n  --dur-normal:  220ms;\n  --dur-slow:    420ms;\n\n  /* ── Layout ───────────────────────────────────────────────────── */\n  --container-narrow: 720px;\n  --container-base:   1080px;\n  --container-wide:   1280px;\n  --container-max:    1440px;\n}\n\n/* ── Semantic type classes — use these to express intent ──────── */\n.t-eyebrow {\n  font-family: var(--font-sans);\n  font-size: var(--fs-xs);\n  font-weight: var(--fw-bold);\n  letter-spacing: var(--tracking-caps);\n  text-transform: uppercase;\n  color: var(--color-fg-muted);\n}\n\n.t-display {\n  font-family: var(--font-display);\n  font-size: var(--fs-6xl);\n  font-weight: var(--fw-black);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tracking-tight);\n  color: var(--color-fg);\n}\n\n.t-h1 {\n  font-family: var(--font-display);\n  font-size: var(--fs-4xl);\n  font-weight: var(--fw-black);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tracking-tight);\n}\n\n.t-h2 {\n  font-family: var(--font-display);\n  font-size: var(--fs-3xl);\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-snug);\n  letter-spacing: var(--tracking-snug);\n}\n\n.t-h3 {\n  font-family: var(--font-sans);\n  font-size: var(--fs-2xl);\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-snug);\n}\n\n.t-h4 {\n  font-family: var(--font-sans);\n  font-size: var(--fs-xl);\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-snug);\n}\n\n.t-lead {\n  font-family: var(--font-sans);\n  font-size: var(--fs-lg);\n  font-weight: var(--fw-regular);\n  line-height: var(--lh-relaxed);\n  color: var(--color-fg-muted);\n}\n\n.t-body {\n  font-family: var(--font-sans);\n  font-size: var(--fs-base);\n  font-weight: var(--fw-regular);\n  line-height: var(--lh-normal);\n}\n\n.t-small {\n  font-family: var(--font-sans);\n  font-size: var(--fs-sm);\n  font-weight: var(--fw-regular);\n  line-height: var(--lh-normal);\n}\n\n.t-caption {\n  font-family: var(--font-sans);\n  font-size: var(--fs-xs);\n  font-weight: var(--fw-regular);\n  line-height: var(--lh-normal);\n  color: var(--color-fg-muted);\n}\n\n.t-mono {\n  font-family: var(--font-mono);\n  font-size: var(--fs-sm);\n}\n\n/* ── Base reset so cards render predictably ───────────────────── */\n.wwt-scope, .wwt-scope * { box-sizing: border-box; }\n.wwt-scope {\n  font-family: var(--font-sans);\n  color: var(--color-fg);\n  background: var(--color-bg);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n</style>\n<script src=\"85382d1d-24dc-4fbd-ab4f-5461ed40d343\">\u003c/script>\n<style>\n  body { margin: 0; }\n  a { color: var(--wwt-blue); text-decoration: none; }\n  a:hover { color: var(--wwt-blue-deep); }\n  ::-webkit-scrollbar { height: 10px; width: 10px; }\n  ::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 999px; }\n  .otp {\n    --surface: #fff; --surface-2: var(--gray-50); --page: var(--gray-50);\n    --line: var(--gray-200); --line-soft: var(--gray-100); --line-strong: var(--gray-300);\n    --text: var(--wwt-ink); --muted: var(--gray-500); --faint: var(--gray-400);\n    --sel-bg: var(--wwt-blue-tint);\n  }\n  .otp[data-theme=\"dark\"] {\n    --surface: #1a1e24; --surface-2: #15181d; --page: #0e1115;\n    --line: #2a2f36; --line-soft: #23272d; --line-strong: #3a4048;\n    --text: #e9ebee; --muted: #9aa2ad; --faint: #6b7480;\n    --sel-bg: rgba(0,134,234,0.20);\n  }\n  @keyframes ot-copied-pop { 0% { opacity: 0; transform: translate(-50%, -100%) translateY(6px) scale(0.94); } 100% { opacity: 1; transform: translate(-50%, -100%) scale(1); } }\n\n  /* \"Someone is editing\" live presence pill */\n  .ot-typing { display: inline-flex; align-items: center; gap: 5px; margin-left: 8px; padding: 2px 8px; border-radius: 999px; background: var(--wwt-blue-tint); color: var(--wwt-dark-blue); font-family: var(--font-sans); font-size: 10px; font-weight: 700; line-height: 1; vertical-align: middle; white-space: nowrap; animation: ot-typing-in 160ms ease-out; }\n  .ot-typing-face { font-size: 11px; line-height: 1; }\n  .ot-typing-label { letter-spacing: 0.02em; }\n  .ot-typing-dots { display: inline-flex; align-items: flex-end; gap: 2px; }\n  .ot-typing-dots i { width: 3px; height: 3px; border-radius: 50%; background: currentColor; opacity: 0.35; animation: ot-typing-bounce 1s infinite ease-in-out; }\n  .ot-typing-dots i:nth-child(2) { animation-delay: 0.15s; }\n  .ot-typing-dots i:nth-child(3) { animation-delay: 0.3s; }\n  @keyframes ot-typing-bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.35; } 30% { transform: translateY(-3px); opacity: 1; } }\n  @keyframes ot-typing-in { 0% { opacity: 0; transform: translateY(-2px); } 100% { opacity: 1; transform: translateY(0); } }\n\n  /* Overlay hovers. The dc-runtime strips style-hover from sc-if content at\n     mount, so buttons inside modals/FABs render flat. Native CSS :hover fixes\n     that regardless of when the element appears. Scoped to fixed overlays\n     (modals + FABs) plus the search × and calendar day cells. */\n  [style*=\"position: fixed\"] button { transition: filter 140ms, background 140ms, color 140ms, border-color 140ms; }\n  [style*=\"position: fixed\"] button:hover { filter: brightness(0.92); }\n  button[title=\"Clear search\"] { transition: background 140ms, color 140ms; }\n  button[title=\"Clear search\"]:hover { background: var(--wwt-red-deep); color: #fff; }\n  .hv-cell { transition: border-color 140ms, background 140ms; }\n  .hv-cell:hover { border-color: var(--wwt-blue) !important; }\n\n  /* KPI card hover-reveal \"copy all work orders\" button */\n  .kpi-card { position: relative; }\n  .kpi-copy { position: absolute; top: 8px; right: 8px; display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--line-strong); background: var(--surface-2); color: var(--faint); cursor: pointer; padding: 0; opacity: 0; transition: opacity 140ms, color 140ms, border-color 140ms, background 140ms; }\n  .kpi-card:hover .kpi-copy { opacity: 1; }\n  .kpi-copy:hover { color: var(--wwt-blue); border-color: var(--wwt-blue); background: var(--sel-bg); }\n</style>\n</helmet>\n<div class=\"wwt-scope otp\" style=\"{{ rootStyle }}\">\n\n  <!-- Top bar -->\n  <div style=\"background: var(--wwt-black); color: #fff; padding: 0 40px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20;\">\n    <div style=\"display: flex; align-items: center; gap: 12px;\">\n      <span style=\"font-weight: 900; font-size: 20px; letter-spacing: -0.02em; line-height: 1;\">WWT</span>\n      <span style=\"width: 1px; height: 20px; background: rgba(255,255,255,0.25);\"></span>\n      <span style=\"font-size: 15px; font-weight: 700; line-height: 1;\">OT Tracker</span>\n    </div>\n    <div style=\"display: flex; align-items: center; gap: 14px; font-family: var(--font-mono); font-size: 12px; color: var(--gray-300);\">\n      <div style=\"display: flex; align-items: center; gap: 8px;\">\n        <span title=\"{{ viewerTitle }}\" style=\"display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 999px; background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.14); line-height: 1;\">\n          <svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"{{ viewerEyeColor }}\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z\"></path><circle cx=\"12\" cy=\"12\" r=\"3\"></circle></svg>\n          <span style=\"font-weight: 700; color: #fff;\">{{ viewerCount }}</span>\n        </span>\n      </div>\n      <button sc-camel-on-click=\"{{ modeBtn.onClick }}\" title=\"Toggle dark mode\" style=\"display: inline-flex; align-items: center; gap: 7px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-family: var(--font-sans); font-size: 12px; font-weight: 700; padding: 6px 12px; border-radius: 999px; cursor: pointer; line-height: 1;\">{{ modeBtn.label }}</button>\n      <span style=\"position: relative; display: inline-flex;\">\n        <button sc-camel-on-click=\"{{ infoBtn.onClick }}\" title=\"About this tracker\" style=\"display: inline-flex; align-items: center; justify-content: center; background: none; border: none; cursor: pointer; color: var(--gray-400); padding: 2px;\" style-hover=\"color: #fff;\"><svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"></circle><path d=\"M12 16v-4M12 8h.01\"></path></svg></button>\n        <sc-if value=\"{{ infoOpen }}\" hint-placeholder-val=\"{{ false }}\">\n          <span style=\"position: absolute; top: 30px; right: 0; width: 350px; background: var(--wwt-black); color: var(--gray-300); border: 1px solid rgba(255,255,255,0.14); border-radius: 6px; padding: 13px 15px; font-family: var(--font-sans); font-size: 12px; line-height: 1.55; box-shadow: var(--shadow-lg); z-index: 30; text-align: left;\">This tracker was made by <strong style=\"color: #fff; font-weight: 700; white-space: nowrap;\">Benjamin Cullum</strong>, hosted by <strong style=\"color: #fff; font-weight: 700; white-space: nowrap;\">Thomas Carnell</strong>. For any questions, please reach out to either support member.</span>\n        </sc-if>\n      </span>\n    </div>\n  </div>\n\n  <div style=\"max-width: 1360px; margin: 0 auto; padding: 32px 40px 80px;\">\n\n    <!-- Headline: progress wheel + KPI cards -->\n    <div style=\"display: flex; align-items: stretch; justify-content: space-between; gap: 40px; flex-wrap: wrap; margin-bottom: 36px;\">\n      <div style=\"display: flex; align-items: center; justify-content: center; gap: 28px; padding: 20px 28px; flex: 1; min-width: 380px; background: var(--surface); border: 1px solid var(--line); border-radius: 8px; box-shadow: var(--shadow-sm);\">\n        <div style=\"position: relative; width: 200px; height: 200px; flex-shrink: 0;\">\n          <svg width=\"200\" height=\"200\" sc-camel-view-box=\"0 0 180 180\" style=\"transform: rotate(-90deg);\">\n            <circle cx=\"90\" cy=\"90\" r=\"78\" fill=\"none\" stroke=\"var(--line)\" stroke-width=\"15\"></circle>\n            <sc-for list=\"{{ ringSegs }}\" as=\"rs\" hint-placeholder-count=\"4\">\n              <circle sc-camel-on-mouse-enter=\"{{ rs.onEnter }}\" sc-camel-on-mouse-leave=\"{{ onBarLeave }}\" sc-camel-on-click=\"{{ rs.onClick }}\" cx=\"90\" cy=\"90\" r=\"78\" fill=\"none\" stroke=\"{{ rs.color }}\" stroke-width=\"15\" stroke-dasharray=\"{{ rs.dash }}\" stroke-dashoffset=\"{{ rs.offset }}\" style=\"cursor: pointer; transition: stroke-dasharray 600ms cubic-bezier(0.22,1,0.36,1), stroke-dashoffset 600ms cubic-bezier(0.22,1,0.36,1), stroke-width 140ms; pointer-events: stroke;\" style-hover=\"stroke-width: 19;\"></circle>\n            </sc-for>\n          </svg>\n          <div style=\"position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; pointer-events: none;\">\n            <span style=\"font-size: 50px; font-weight: 900; line-height: 1; letter-spacing: -0.03em; color: {{ ringMainColor }};\">{{ ringMain }}</span>\n            <span style=\"font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--faint);\">{{ ringSub }}</span>\n          </div>\n        </div>\n        <div style=\"display: flex; flex-direction: column; gap: 8px;\">\n          <span style=\"font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--wwt-bright-red);\">Outbound Progress</span>\n          <h1 style=\"margin: 0; font-size: 34px; font-weight: 900; line-height: 1.05; letter-spacing: -0.02em; color: var(--text);\">{{ capacity }} / {{ activeTotal }} filled</h1>\n          <p style=\"margin: 0; font-size: 15px; color: var(--muted); max-width: 420px; line-height: 1.5;\">{{ otDone }} Outbounded and {{ btsDone }} Sent BTS</p>\n        </div>\n      </div>\n      <div style=\"display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; flex: 1; min-width: 360px; max-width: 560px;\">\n        <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"6\">\n          <div class=\"kpi-card\" sc-camel-on-click=\"{{ k.onClick }}\" style=\"{{ k.cardStyle }}\" style-hover=\"transform: scale(1.03); box-shadow: var(--shadow-md);\">\n            <button class=\"kpi-copy\" sc-camel-on-click=\"{{ k.onCopyWos }}\" title=\"{{ k.copyTitle }}\"><svg width=\"14\" height=\"14\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\"></rect><path d=\"M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1\"></path></svg></button>\n            <span style=\"font-size: {{ k.valueSize }}; font-weight: 900; line-height: 1; letter-spacing: -0.02em; color: {{ k.num }};\">{{ k.value }}</span>\n            <span style=\"font-size: 16px; font-weight: 700; color: var(--text);\">{{ k.label }}</span>\n          </div>\n        </sc-for>\n      </div>\n    </div>\n\n    <!-- ============ TRACKER TAB ============ -->\n    <sc-if value=\"{{ showTracker }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n\n      <!-- Rack map + detail -->\n      <div style=\"display: grid; grid-template-columns: 1fr 380px; gap: 24px; margin-bottom: 40px;\">\n\n        <div style=\"background: var(--surface); border: 1px solid var(--line); border-radius: 6px; padding: 22px 24px; box-shadow: var(--shadow-sm);\">\n          <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; flex-wrap: wrap; gap: 12px; padding-bottom: 16px; border-bottom: 1px solid var(--line-strong);\">\n            <div style=\"display: flex; flex-direction: column; gap: 5px;\">\n              <span style=\"font-size: 20px; font-weight: 900; letter-spacing: -0.01em; color: var(--text);\">Location map</span>\n              <span title=\"{{ total }} rack locations across 8 zones\" style=\"display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 700; color: var(--muted);\">\n                <svg width=\"13\" height=\"13\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"7\" height=\"7\" rx=\"1\"></rect><rect x=\"14\" y=\"3\" width=\"7\" height=\"7\" rx=\"1\"></rect><rect x=\"3\" y=\"14\" width=\"7\" height=\"7\" rx=\"1\"></rect><rect x=\"14\" y=\"14\" width=\"7\" height=\"7\" rx=\"1\"></rect></svg>\n                <span>{{ total }} locations · {{ zoneCount }} zones</span>\n              </span>\n            </div>\n            <div style=\"display: flex; gap: 8px; flex-wrap: wrap;\">\n              <sc-for list=\"{{ legend }}\" as=\"lg\" hint-placeholder-count=\"5\">\n                <button sc-camel-on-click=\"{{ lg.onClick }}\" style=\"{{ lg.style }}\" style-hover=\"transform: scale(1.06); box-shadow: var(--shadow-sm);\">\n                  <span style=\"{{ lg.swatchStyle }}\"></span>\n                  <span>{{ lg.label }}</span>\n                  <span style=\"font-family: var(--font-mono); opacity: 0.6;\">{{ lg.count }}</span>\n                </button>\n              </sc-for>\n            </div>\n          </div>\n\n          <div style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;\">\n            <sc-for list=\"{{ racks }}\" as=\"rack\" hint-placeholder-count=\"8\">\n              <div style=\"border: 1px solid var(--line-strong); border-radius: 8px; padding: 12px; background: var(--surface-2); box-shadow: var(--shadow-sm);\">\n                <div style=\"display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;\">\n                  <span style=\"font-family: var(--font-mono); font-size: 13px; font-weight: 500; color: var(--text);\">{{ rack.zone }}</span>\n                  <span style=\"font-family: var(--font-mono); font-size: 11px; color: var(--faint);\">{{ rack.label }}</span>\n                </div>\n                <div style=\"display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px;\">\n                  <sc-for list=\"{{ rack.slots }}\" as=\"slot\" hint-placeholder-count=\"15\">\n                    <div sc-camel-on-click=\"{{ slot.onSelect }}\" sc-camel-on-context-menu=\"{{ slot.onCopy }}\" title=\"{{ slot.title }}\" style=\"{{ slot.style }}\" style-hover=\"transform: scale(1.22); filter: brightness(1.08); z-index: 2;\"></div>\n                  </sc-for>\n                </div>\n              </div>\n            </sc-for>\n          </div>\n        </div>\n\n        <!-- Detail panel: fixed in place (not sticky), stretched to the same\n             height as the Location map card, with the field rows spread to\n             fill it. -->\n        <div style=\"background: var(--surface); border: 1px solid var(--line); border-radius: 6px; box-shadow: var(--shadow-sm); overflow: hidden; display: flex; flex-direction: column;\">\n          <div style=\"{{ sel.headStyle }}\">\n            <span style=\"font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.8;\">{{ sel.kicker }}</span>\n            <div style=\"font-size: 25px; font-weight: 900; letter-spacing: -0.01em; margin-top: 5px;\">{{ sel.otLoc }}</div>\n          </div>\n          <div style=\"padding: 8px 22px 20px; flex: 1; display: flex; flex-direction: column; justify-content: space-evenly;\">\n            <sc-for list=\"{{ sel.fields }}\" as=\"f\" hint-placeholder-count=\"6\">\n              <div style=\"display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--line-soft);\">\n                <span style=\"font-size: 13px; color: var(--text); font-weight: 800;\">{{ f.k }}</span>\n                <span style=\"font-size: 14px; text-align: right; font-family: {{ f.mono }}; color: var(--text); word-break: break-all;\">{{ f.v }}</span>\n              </div>\n            </sc-for>\n          </div>\n        </div>\n      </div>\n\n      <!-- Duplicate warning -->\n      <sc-if value=\"{{ hasDup }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display: flex; align-items: center; gap: 10px; background: var(--wwt-bright-red-25); border: 1px solid var(--wwt-bright-red); border-radius: 6px; padding: 11px 16px; margin-bottom: 14px;\">\n          <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"var(--wwt-red-deep)\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex-shrink: 0;\"><path d=\"M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z\"></path><path d=\"M12 9v4M12 17h.01\"></path></svg>\n          <span style=\"font-size: 13px; font-weight: 700; color: var(--wwt-red-deep);\">{{ dupMsg }}</span>\n        </div>\n      </sc-if>\n\n      <!-- Filters -->\n      <div style=\"display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 14px;\">\n        <span style=\"position: relative; flex: 1; min-width: 260px; display: inline-flex; align-items: center;\">\n          <input id=\"ot-search\" value=\"{{ query }}\" sc-camel-on-input=\"{{ onSearch }}\" placeholder=\"Search location, work order, serial, LPN…\" style=\"width: 100%; height: 40px; padding: 0 38px 0 14px; border: 1.5px solid var(--line-strong); border-radius: 4px; font-family: var(--font-sans); font-size: 14px; color: var(--text); background: var(--surface); outline: none; box-sizing: border-box;\">\n          <sc-if value=\"{{ hasQuery }}\" hint-placeholder-val=\"{{ false }}\">\n            <button sc-camel-on-click=\"{{ onClearSearch }}\" title=\"Clear search\" style=\"position: absolute; right: 8px; top: 50%; transform: translateY(-50%); display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 999px; border: none; background: var(--surface-2); color: var(--faint); cursor: pointer; padding: 0;\" style-hover=\"background: var(--wwt-red-deep); color: #fff;\"><svg width=\"13\" height=\"13\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 6 6 18M6 6l12 12\"></path></svg></button>\n          </sc-if>\n        </span>\n        <sc-raw-select value=\"{{ zoneFilter }}\" sc-camel-on-change=\"{{ onZone }}\" style=\"height: 40px; padding: 0 12px; border: 1.5px solid var(--line-strong); border-radius: 4px; font-family: var(--font-sans); font-size: 14px; background: var(--surface); color: var(--text);\">\n          <sc-for list=\"{{ zoneOptions }}\" as=\"z\" hint-placeholder-count=\"9\">\n            <option value=\"{{ z.value }}\">{{ z.label }}</option>\n          </sc-for>\n        </sc-raw-select>\n        <span style=\"font-family: var(--font-mono); font-size: 12px; color: var(--muted); white-space: nowrap;\">{{ resultCount }} shown</span>\n      </div>\n\n      <!-- Table -->\n      <div style=\"background: var(--surface); border: 1px solid var(--line); border-radius: 6px; box-shadow: var(--shadow-sm); overflow: hidden;\">\n        <div style=\"overflow-x: auto;\">\n          <sc-raw-table style=\"width: 100%; border-collapse: collapse; font-size: 13px; min-width: 860px;\">\n            <sc-raw-thead>\n              <sc-raw-tr style=\"backgroun lder-count=\"7\">\n              <div draggable=\"true\" sc-camel-on-drag-start=\"{{ st.onDragStart }}\" sc-camel-on-drag-over=\"{{ st.onDragOver }}\" sc-camel-on-drop=\"{{ st.onDrop }}\" style=\"display: flex; align-items: center; gap: 8px; padding: 7px 2px; border-bottom: 1px solid var(--line-soft);\">\n                <span title=\"Drag to reorder\" style=\"cursor: grab; color: var(--faint); font-size: 15px; line-height: 1; flex: 0 0 auto; user-select: none;\">⠿</span>\n                <input type=\"color\" value=\"{{ st.colorHex }}\" sc-camel-on-change=\"{{ st.onColor }}\" title=\"Status color\" style=\"width: 34px; height: 30px; border: 1px solid var(--line-strong); border-radius: 6px; padding: 2px; cursor: pointer; background: var(--surface); flex: 0 0 auto;\">\n                <input value=\"{{ st.label }}\" sc-camel-on-change=\"{{ st.onLabel }}\" style=\"flex: 1; min-width: 0; height: 32px; padding: 0 10px; border: 1px solid var(--line-strong); border-radius: 4px; font-family: var(--font-sans); font-size: 13px; color: var(--text); background: var(--surface); outline: none;\" style-focus=\"border-color: var(--wwt-blue);\">\n                <span style=\"font-family: var(--font-mono); font-size: 9px; font-weight: 800; letter-spacing: 0.05em; color: var(--faint); flex: 0 0 auto;\">{{ st.tag }}</span>\n                <sc-if value=\"{{ st.kpiToggleable }}\" hint-placeholder-val=\"{{ true }}\">\n                  <button sc-camel-on-click=\"{{ st.onToggleKpi }}\" title=\"Show this status as a KPI card at the top\" style=\"{{ st.kpiStyle }}\">{{ st.kpiLabel }}</button>\n                </sc-if>\n                <sc-if value=\"{{ st.removable }}\" hint-placeholder-val=\"{{ true }}\">\n                  <button sc-camel-on-click=\"{{ st.onRemove }}\" style=\"font-family: var(--font-sans); font-size: 11px; font-weight: 700; padding: 5px 10px; border-radius: 4px; cursor: pointer; border: 1px solid var(--line-strong); background: var(--surface); color: var(--wwt-red-deep); white-space: nowrap; flex: 0 0 auto;\">{{ st.removeLabel }}</button>\n                </sc-if>\n              </div>\n            </sc-for>\n          </div>\n        </sc-if>\n\n        <!-- Locations editor -->\n        <sc-if value=\"{{ adminSecLocations }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding: 14px 22px 8px; border-bottom: 1px solid var(--line-soft); flex-shrink: 0;\">\n            <sc-if value=\"{{ adminSecNotice }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-bottom: 10px; padding: 9px 13px; border-radius: 4px; background: var(--wwt-bright-red-25); color: var(--wwt-red-deep); font-size: 12px; font-weight: 700;\">{{ adminSecNotice }}</div>\n            </sc-if>\n            <div style=\"display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;\">\n              <input value=\"{{ adminNewOt }}\" sc-camel-on-change=\"{{ onAdminNewOt }}\" placeholder=\"OT location\" style=\"flex: 2 1 160px; height: 36px; padding: 0 12px; border: 1.5px solid var(--line-strong); border-radius: 4px; font-family: var(--font-mono); font-size: 13px; color: var(--text); background: var(--surface); outline: none;\" style-focus=\"border-color: var(--wwt-blue);\">\n              <input value=\"{{ adminNewBts }}\" sc-camel-on-change=\"{{ onAdminNewBts }}\" placeholder=\"BTS location\" style=\"flex: 2 1 140px; height: 36px; padding: 0 12px; border: 1.5px solid var(--line-strong); border-radius: 4px; font-family: var(--font-mono); font-size: 13px; color: var(--text); background: var(--surface); outline: none;\" style-focus=\"border-color: var(--wwt-blue);\">\n              <input value=\"{{ adminNewZone }}\" sc-camel-on-change=\"{{ onAdminNewZone }}\" placeholder=\"Zone\" style=\"flex: 1 1 70px; height: 36px; padding: 0 12px; border: 1.5px solid var(--line-strong); border-radius: 4px; font-family: var(--font-mono); font-size: 13px; color: var(--text); background: var(--surface); outline: none;\" style-focus=\"border-col n              </div>\n            </sc-for>\n            <sc-if value=\"{{ adminLocCapped }}\" hint-placeholder-val=\"{{ false }}\">\n              <span style=\"font-size: 11px; color: var(--faint); display: block; margin-top: 10px;\">Showing first 100 — search to narrow.</span>\n            </sc-if>\n          </div>\n        </sc-if>\n\n        <!-- Fields editor -->\n        <sc-if value=\"{{ adminSecFields }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding: 14px 22px 10px; border-bottom: 1px solid var(--line-soft); flex-shrink: 0;\">\n            <sc-if value=\"{{ adminSecNotice }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"margin-bottom: 10px; padding: 9px 13px; border-radius: 4px; background: var(--wwt-bright-red-25); color: var(--wwt-red-deep); font-size: 12px; font-weight: 700;\">{{ adminSecNotice }}</div>\n            </sc-if>\n            <div style=\"display: flex; gap: 8px; flex-wrap: wrap; align-items: center;\">\n              <input value=\"{{ adminNewFieldLabel }}\" sc-camel-on-change=\"{{ onAdminNewFieldLabel }}\" placeholder=\"New field name…\" style=\"flex: 2 1 160px; height: 36px; padding: 0 12px; border: 1.5px solid var(--line-strong); border-radius: 4px; font-family: var(--font-sans); font-size: 13px; color: var(--text); background: var(--surface); outline: none;\" style-focus=\"border-color: var(--wwt-blue);\">\n              <sc-raw-select value=\"{{ adminNewFieldType }}\" sc-camel-on-change=\"{{ onAdminNewFieldType }}\" style=\"height: 36px; padding: 0 10px; border: 1.5px solid var(--line-strong); border-radius: 4px; font-family: var(--font-sans); font-size: 13px; color: var(--text); background: var(--surface); cursor: pointer;\">\n                <sc-for list=\"{{ adminFieldTypeOptions }}\" as=\"t\" hint-placeholder-count=\"4\"><option value=\"{{ t.value }}\" style=\"background: var(--surface); color: var(--text);\">{{ t.label }}</option></sc-for>\n              </sc-raw-select>\n              <button sc-camel-on-click=\"{{ onAdminAddField }}\" style=\"font-family: var(--font-sans); font-size: 13px; font-weight: 700; padding: 10px 16px; border-radius: 4px; border: none; background: var(--wwt-dark-blue); color: #fff; cursor: pointer;\" style-hover=\"background: var(--wwt-blue-deep);\">Add field</button>\n            </div>\n            <sc-if value=\"{{ adminNewFieldIsSelect }}\" hint-placeholder-val=\"{{ false }}\">\n              <input value=\"{{ adminNewFieldOptions }}\" sc-camel-on-change=\"{{ onAdminNewFieldOptions }}\" placeholder=\"Dropdown options, comma-separated…\" style=\"width: 100%; margin-top: 8px; height: 34px; padding: 0 12px; border: 1.5px solid var(--line-strong); border-radius: 4px; font-family: var(--font-sans); font-size: 13px; color: var(--text); background: var(--surface); outline: none; box-sizing: border-box;\" style-focus=\"border-color: var(--wwt-blue);\">\n            </sc-if>\n          </div>\n          <div style=\"overflow-y: auto; padding: 4px 22px 16px;\">\n            <sc-for list=\"{{ adminFields }}\" as=\"fl\" hint-placeholder-count=\"8\">\n              <div draggable=\"true\" sc-camel-on-drag-start=\"{{ fl.onDragStart }}\" sc-camel-on-drag-over=\"{{ fl.onDragOver }}\" sc-camel-on-drop=\"{{ fl.onDrop }}\" style=\"display: flex; align-items: center; gap: 8px; padding: 8px 2px; border-bottom: 1px solid var(--line-soft);\">\n                <span title=\"Drag to reorder\" style=\"cursor: grab; color: var(--faint); font-size: 15px; line-height: 1; flex: 0 0 auto; user-select: none;\">⠿</span>\n                <span style=\"flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 8px;\"><span style=\"font-size: 13px; font-weight: 500; color: var(--text);\">{{ fl.label }}</span><span style=\"font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; color: var(--faint);\">{{ fl.typeLabel }}</span></span>\n                <sc-if value=\"{{ fl.dupable }}\" hint-placeholder-val=\"{{ false }}\">\n                  <button sc-camel-on-click=\"{{ fl.onToggleDup }}\" title=\"Toggle duplicate detection\" style=\"{{ fl.dupStyle }}\">{{ fl.dupLabel }}</button>\n                </sc-if>\n                <sc-if value=\"{{ fl.removable }}\" hint-placeholder-val=\"{{ true }}\">\n                  <button sc-camel-on-click=\"{{ fl.onRemove }}\" style=\"font-family: var(--font-sans); font-size: 11px; font-weight: 700; padding: 5px 10px; border-radius: 4px; cursor: pointer; border: 1px solid var(--line-strong); background: var(--surface); color: var(--wwt-red-deep); white-space: nowrap; flex: 0 0 auto;\">{{ fl.removeLabel }}</button>\n                </sc-if>\n              </div>\n            </sc-for>\n          </div>\n        </sc-if>\n\n      </div>\n    </div>\n  </sc-if>\n\n  <!-- Note hover preview -->\n  <sc-if value=\"{{ noteHover }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-mouse-enter=\"{{ onNoteHoverKeep }}\" sc-camel-on-mouse-leave=\"{{ onNoteLeave }}\" style=\"{{ noteHoverStyle }}\">\n      <div style=\"background: var(--wwt-black); color: #fff; border: 1px solid rgba(255,255,255,0.14); border-radius: 8px; box-shadow: var(--shadow-lg); width: 260px; overflow: hidden;\">\n        <div style=\"padding: 12px 14px; display: flex; flex-direction: column; gap: 8px;\">\n          <span style=\"font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--wwt-light-blue-50);\">Note</span>\n          <span style=\"font-size: 13px; line-height: 1.5; color: var(--gray-200); white-space: pre-wrap; word-break: break-word;\">{{ noteHoverText }}</span>\n        </div>\n      </div>\n      <div style=\"width: 12px; height: 12px; background: var(--wwt-black); position: absolute; left: 50%; bottom: -6px; transform: translateX(-50%) rotate(45deg); border-right: 1px solid rgba(255,255,255,0.14); border-bottom: 1px solid rgba(255,255,255,0.14);\"></div>\n    </div>\n  </sc-if>\n</div>\n</x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { data: null, tab: 'tracker', query: '', zoneFilter: 'all', statusFilter: 'all', sortKey: null, sortDir: 1, sel: null, dark: false, barHover: null, cleared: {}, clearedAt: {}, now: 0, confirmClear: null, scrolled: false, noteEdit: null, noteText: '', noDice: null, noteHover: null, datePicker: null, copied: null, admin: null, viewers: 1, live: 'connecting' };\n\n  componentDidMount() {\n    const src = window.__OT_DATA ? Promise.resolve(window.__OT_DATA) : fetch('ot_data.json').then(r => r.json());\n    Promise.resolve(this._initSupabase())\n      .then(() => Promise.all([src, this._fetchEdits(), this._fetchConfig()]))\n      .then(([d, edits, cfg]) => {\n      this._seedRecords = (d.records || []).filter(r => r.zone && r.zone.trim());\n      this._applyConfig(cfg);\n      const records = this._composeRecords();\n      this.setState({ data: { records }, sel: records.find(r => r.status) || records[0] || null });\n      if (this._sb) { this._subscribeLive(); this._initPresence(); }\n      else { this._setLive('offline'); }  // Supabase couldn't load — showing last-known local data.\n    }).catch((e) => { console.warn(e); this._applyConfig(null); this.setState({ data: { records: [] } }); });\n    // Realtime can silently die (proxy drops the WebSocket, laptop sleeps, etc.).\n    // Reconcile from REST on focus/visibility/reconnect and on a slow poll so a\n    // stalled client always catches back up to the datastore.\n    this._onVisible = () => { if (!document.hidden) this._resync('visible'); };\n    document.addEventListener('visibilitychange', this._onVisible);\n    this._onFocus = () => this._resync('focus');\n    window.addEventListener('focus', this._onFocus);\n    this._onOnline = () => this._resync('online');\n    window.addEventListener('online', this._onOnline);\n    this._resyncTimer = setInterval(() => { if (!document.hidden) this._resync('poll'); }, 45000);\n    this._
